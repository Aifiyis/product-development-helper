<div class="modal fade" id="createCompetitorTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <form method="post" action="{{ url_for('competitor.create_task') }}" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">创建竞品采集</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">目标网站</label>
                    <select class="form-select" name="target_sites" multiple size="10" required>
                        {% for site in competitors %}
                        <option value="{{ site.domain }}">{{ site.domain }} · {{ categories.get(site.category, site.category) }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">目标品类</label>
                        <select class="form-select" name="target_category">
                            {% for key, label in categories.items() %}
                            <option value="{{ key }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">每站采集数量</label>
                        <input class="form-control" name="products_per_site" type="number" min="1" max="250" value="20">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">FB广告触发值</label>
                        <input class="form-control" name="fb_ad_threshold" type="number" min="0" value="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">定时间隔</label>
                        <select class="form-select" name="collection_cycle">
                            <option value="30m">30 分钟</option>
                            <option value="1h">1 小时</option>
                            <option value="6h" selected>6 小时</option>
                            <option value="12h">12 小时</option>
                            <option value="1d">1 天</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                <button type="submit" class="btn btn-primary">保存任务</button>
            </div>
        </form>
    </div>
</div>
