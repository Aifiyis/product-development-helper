<div class="modal fade" id="createCompetitorTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <form method="post" action="{{ url_for('competitor.create_task') }}" class="modal-content" data-competitor-task-form>
            <div class="modal-header">
                <h5 class="modal-title">创建竞品采集</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">选择网站类别</label>
                    <select class="form-select" name="target_category" data-site-category-filter>
                        <option value="">不限</option>
                        {% for key, label in categories.items() %}
                        <option value="{{ key }}">{{ label.replace("垂直", "") }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">目标网站</label>
                    <input class="form-control mb-2" type="search" placeholder="搜索域名、介绍或品类" data-site-search>
                    <select class="form-select" name="target_sites" multiple size="10" required data-site-select>
                        {% for site in competitors %}
                        <option value="{{ site.domain }}" data-category="{{ site.category }}">{{ site.domain }} · {{ platform_labels.get(site.platform, site.platform or "未知") }} · {{ categories.get(site.category, site.category).replace("垂直", "") }} · {{ site.description }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">每站采集数量</label>
                        <input class="form-control" name="products_per_site" type="number" min="1" max="250" value="20">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">采集条件</label>
                        <select class="form-select" name="sort_mode">
                            <option value="best_selling" selected>按销量排名</option>
                            <option value="newest">按最新上架时间</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">产品关键词</label>
                        <input class="form-control" name="product_keywords" placeholder="逗号分隔，例如 necklace, pet memorial">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">定时间隔</label>
                        <select class="form-select" name="collection_cycle" data-competitor-cycle>
                            <option value="instant" selected>即时</option>
                            <option value="30m">30 分钟</option>
                            <option value="1h">1 小时</option>
                            <option value="6h">6 小时</option>
                            <option value="12h">12 小时</option>
                            <option value="1d">1 天</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                <button type="submit" class="btn btn-primary" data-competitor-save>保存任务</button>
            </div>
        </form>
    </div>
</div>
